<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ILUMINATY</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #05050a;
      --bg-primary: #0a0a12;
      --bg-surface: #0f0f1a;
      --bg-elevated: #141422;
      --bg-hover: #1a1a2e;
      --border: #1a1a30;
      --border-active: #2a2a4a;
      --text: #e4e4ee;
      --text-dim: #8888a8;
      --text-ghost: #444460;
      --accent: #00ff88;
      --accent-dim: rgba(0,255,136,0.12);
      --danger: #ff4466;
      --warn: #ffaa22;
      --purple: #7b61ff;
      --blue: #4488ff;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', -apple-system, system-ui, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg-deep);
      color: var(--text);
      font-family: var(--sans);
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    /* ─── Loading Screen ─── */
    .boot-screen {
      position: fixed;
      inset: 0;
      background: var(--bg-deep);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.6s, visibility 0.6s;
    }

    .boot-screen.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .boot-logo {
      width: 120px;
      height: 132px;
      margin-bottom: 32px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .boot-title {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 6px;
      color: var(--accent);
      text-shadow: 0 0 30px rgba(0,255,136,0.3);
      margin-bottom: 8px;
    }

    .boot-sub {
      font-size: 12px;
      color: var(--text-ghost);
      letter-spacing: 2px;
      margin-bottom: 40px;
    }

    .boot-progress {
      width: 200px;
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .boot-progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 1px;
      width: 0%;
      transition: width 0.3s;
      box-shadow: 0 0 10px var(--accent);
    }

    .boot-status {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      height: 16px;
    }

    .boot-steps {
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-ghost);
    }

    .boot-step { transition: color 0.3s; }
    .boot-step.done { color: var(--accent); }
    .boot-step.active { color: var(--text-dim); }
    .boot-step::before { content: '> '; opacity: 0.5; }
    .boot-step.done::before { content: '+ '; color: var(--accent); opacity: 1; }

    /* ─── Error Screen ─── */
    .error-screen {
      position: fixed;
      inset: 0;
      background: var(--bg-deep);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99;
      gap: 20px;
    }

    .error-screen.show { display: flex; }

    .error-icon {
      width: 80px;
      height: 80px;
      opacity: 0.3;
    }

    .error-title {
      font-family: var(--mono);
      font-size: 16px;
      color: var(--danger);
      letter-spacing: 2px;
    }

    .error-msg {
      font-size: 13px;
      color: var(--text-dim);
      text-align: center;
      max-width: 360px;
      line-height: 1.7;
    }

    .error-cmd {
      font-family: var(--mono);
      font-size: 12px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      padding: 10px 20px;
      border-radius: 6px;
      color: var(--accent);
    }

    .error-retry {
      font-family: var(--mono);
      font-size: 12px;
      padding: 8px 28px;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 1px;
    }

    .error-retry:hover {
      background: var(--accent-dim);
      box-shadow: 0 0 15px rgba(0,255,136,0.15);
    }

    /* ─── App Frame (iframe to dashboard) ─── */
    .app-frame {
      position: fixed;
      inset: 0;
      opacity: 0;
      transition: opacity 0.5s;
    }

    .app-frame.visible { opacity: 1; }

    .app-frame iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ─── Scan line overlay (subtle) ─── */
    .scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 200;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      opacity: 0.5;
    }
  </style>
</head>
<body>

<!-- Subtle CRT scanline overlay -->
<div class="scanlines"></div>

<!-- Boot Screen -->
<div class="boot-screen" id="bootScreen">
  <div class="boot-logo">
    <svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="g" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feComposite in="SourceGraphic" in2="b" operator="over"/></filter>
        <filter id="sg" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="6" result="b"/><feComposite in="SourceGraphic" in2="b" operator="over"/></filter>
        <radialGradient id="pg" cx="50%" cy="45%"><stop offset="0%" stop-color="#00ff88"/><stop offset="60%" stop-color="#00cc6a"/><stop offset="100%" stop-color="#008844"/></radialGradient>
      </defs>
      <polygon points="100,8 18,190 182,190" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.06" filter="url(#sg)"/>
      <polygon points="100,18 24,186 176,186" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.25"/>
      <polygon points="100,38 42,176 158,176" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.15"/>
      <polygon points="100,28 30,182 170,182" fill="#00ff88" opacity="0.03"/>
      <path d="M55,120 Q100,75 145,120 Q100,165 55,120 Z" fill="#00ff88" opacity="0.04"/>
      <path d="M55,120 Q100,75 145,120 Q100,165 55,120 Z" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.7" filter="url(#g)"/>
      <circle cx="100" cy="120" r="22" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.8"/>
      <circle cx="100" cy="120" r="16" fill="none" stroke="#00ff88" stroke-width="0.8" opacity="0.4"/>
      <circle cx="100" cy="120" r="9" fill="url(#pg)" filter="url(#g)"/>
      <circle cx="100" cy="120" r="4" fill="#003322" opacity="0.6"/>
      <circle cx="95" cy="115" r="3" fill="#fff" opacity="0.7"/>
      <circle cx="105" cy="125" r="1.5" fill="#fff" opacity="0.4"/>
      <line x1="100" y1="0" x2="100" y2="12" stroke="#00ff88" stroke-width="1.5" opacity="0.3" filter="url(#g)"/>
      <line x1="72" y1="6" x2="78" y2="16" stroke="#00ff88" stroke-width="1" opacity="0.2"/>
      <line x1="128" y1="6" x2="122" y2="16" stroke="#00ff88" stroke-width="1" opacity="0.2"/>
      <circle cx="100" cy="18" r="2" fill="#00ff88" opacity="0.5"/>
      <circle cx="24" cy="186" r="2" fill="#00ff88" opacity="0.3"/>
      <circle cx="176" cy="186" r="2" fill="#00ff88" opacity="0.3"/>
    </svg>
  </div>
  <div class="boot-title">ILUMINATY</div>
  <div class="boot-sub">THE AI SEES ALL</div>
  <div class="boot-progress"><div class="boot-progress-fill" id="bootProgress"></div></div>
  <div class="boot-status" id="bootStatus">Initializing...</div>
  <div class="boot-steps">
    <div class="boot-step" id="step1">Scanning vision daemon</div>
    <div class="boot-step" id="step2">Establishing connection</div>
    <div class="boot-step" id="step3">Loading perception engine</div>
    <div class="boot-step" id="step4">Calibrating monitors</div>
    <div class="boot-step" id="step5">Vision online</div>
  </div>
</div>

<!-- Error Screen -->
<div class="error-screen" id="errorScreen">
  <div class="error-icon">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <path d="M50 20 Q15 50 50 80 Q85 50 50 20 Z" fill="none" stroke="#ff4466" stroke-width="2" opacity="0.5"/>
      <circle cx="50" cy="50" r="14" fill="none" stroke="#ff4466" stroke-width="1.5" opacity="0.4"/>
      <line x1="38" y1="38" x2="62" y2="62" stroke="#ff4466" stroke-width="2" opacity="0.6"/>
      <line x1="62" y1="38" x2="38" y2="62" stroke="#ff4466" stroke-width="2" opacity="0.6"/>
    </svg>
  </div>
  <div class="error-title">VISION OFFLINE</div>
  <div class="error-msg">
    The ILUMINATY daemon is not running.<br/>
    Start it to enable visual perception:
  </div>
  <div class="error-cmd">python main.py start</div>
  <button class="error-retry" onclick="boot()">RETRY CONNECTION</button>
</div>

<!-- App Frame -->
<div class="app-frame" id="appFrame">
  <iframe id="dashboard" src=""></iframe>
</div>

<script>
const API = 'http://127.0.0.1:8420';

function setStep(n, state) {
  const el = document.getElementById('step' + n);
  if (el) {
    el.className = 'boot-step ' + state;
  }
}

function setProgress(pct) {
  document.getElementById('bootProgress').style.width = pct + '%';
}

function setStatus(text) {
  document.getElementById('bootStatus').textContent = text;
}

async function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

async function boot() {
  // Reset UI
  document.getElementById('bootScreen').classList.remove('hidden');
  document.getElementById('errorScreen').classList.remove('show');
  document.getElementById('appFrame').classList.remove('visible');

  for (let i = 1; i <= 5; i++) setStep(i, '');
  setProgress(0);

  // Step 1: Scan
  setStep(1, 'active');
  setStatus('Scanning for daemon on port 8420...');
  setProgress(10);
  await sleep(400);

  let connected = false;
  for (let attempt = 1; attempt <= 8; attempt++) {
    setStatus('Attempt ' + attempt + '/8...');
    setProgress(10 + attempt * 8);
    try {
      const res = await fetch(API + '/health', { signal: AbortSignal.timeout(2000) });
      if (res.ok) {
        const data = await res.json();
        if (data.status === 'alive') {
          connected = true;
          break;
        }
      }
    } catch(e) {}
    await sleep(800);
  }

  if (!connected) {
    document.getElementById('bootScreen').classList.add('hidden');
    document.getElementById('errorScreen').classList.add('show');
    return;
  }

  setStep(1, 'done');

  // Step 2: Connect
  setStep(2, 'active');
  setStatus('Connection established');
  setProgress(50);
  await sleep(300);
  setStep(2, 'done');

  // Step 3: Load
  setStep(3, 'active');
  setStatus('Loading perception engine...');
  setProgress(65);
  try {
    const stats = await (await fetch(API + '/buffer/stats')).json();
    setStatus('Buffer: ' + stats.slots_used + ' frames, ' + stats.memory_mb + 'MB');
  } catch(e) {}
  await sleep(400);
  setStep(3, 'done');

  // Step 4: Monitors
  setStep(4, 'active');
  setStatus('Detecting monitors...');
  setProgress(80);
  try {
    const mon = await (await fetch(API + '/monitors')).json();
    setStatus(mon.count + ' monitor(s) detected');
  } catch(e) {}
  await sleep(400);
  setStep(4, 'done');

  // Step 5: Online
  setStep(5, 'active');
  setProgress(95);
  setStatus('Activating vision...');
  await sleep(300);
  setStep(5, 'done');
  setProgress(100);
  setStatus('Vision online');
  await sleep(500);

  // Show dashboard
  document.getElementById('dashboard').src = API;
  document.getElementById('appFrame').classList.add('visible');

  await sleep(600);
  document.getElementById('bootScreen').classList.add('hidden');
}

boot();
</script>
</body>
</html>
